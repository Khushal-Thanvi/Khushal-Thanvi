<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#141b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="nodeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0e75b6;stop-opacity:0.9" />
      <stop offset="60%" style="stop-color:#0e75b6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0e75b6;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="edgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0e75b6;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#0e75b6;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0e75b6;stop-opacity:0" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <g opacity="0.5">
    <!-- Floating ambient particles -->
    <circle cx="150" cy="150" r="1.5" fill="#38bdf8">
      <animate attributeName="cy" values="150;50;150" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="40" r="2" fill="#38bdf8">
      <animate attributeName="cy" values="40;160;40" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="180" r="1.5" fill="#38bdf8">
      <animate attributeName="cy" values="180;30;180" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="80" r="1.5" fill="#38bdf8">
      <animate attributeName="cy" values="80;120;80" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="160" r="1" fill="#38bdf8">
      <animate attributeName="cy" values="160;20;160" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="60" r="2" fill="#38bdf8">
      <animate attributeName="cy" values="60;150;60" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g stroke-width="1.5" fill="none">
    <!-- Layer 1 Connections -->
    <line x1="100" y1="100" x2="300" y2="40" stroke="url(#edgeGradient)" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,200;100,100;0,200" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="100" x2="300" y2="160" stroke="url(#edgeGradient)" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,200;100,100;0,200" dur="3.5s" repeatCount="indefinite"/>
    </line>
    
    <!-- Layer 2 Connections -->
    <line x1="300" y1="40" x2="600" y2="100" stroke="url(#edgeGradient)" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;150,150;0,300" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="160" x2="600" y2="100" stroke="url(#edgeGradient)" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;150,150;0,300" dur="4.2s" repeatCount="indefinite"/>
    </line>
    
    <!-- Cross Connections -->
    <line x1="300" y1="40" x2="500" y2="180" stroke="url(#edgeGradient)" filter="url(#glow)" stroke-width="1" opacity="0.5">
      <animate attributeName="stroke-dasharray" values="0,250;125,125;0,250" dur="5s" repeatCount="indefinite"/>
    </line>
    
    <!-- Layer 3 Connections -->
    <line x1="600" y1="100" x2="900" y2="60" stroke="url(#edgeGradient)" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;150,150;0,300" dur="3.8s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="100" x2="900" y2="140" stroke="url(#edgeGradient)" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;150,150;0,300" dur="4.5s" repeatCount="indefinite"/>
    </line>
    
    <!-- Final Output Layer -->
    <line x1="900" y1="60" x2="1100" y2="100" stroke="url(#edgeGradient)" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,200;100,100;0,200" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="900" y1="140" x2="1100" y2="100" stroke="url(#edgeGradient)" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,200;100,100;0,200" dur="3.6s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <g filter="url(#glow)">
    <!-- Node cluster 1 -->
    <circle cx="100" cy="100" r="10" fill="url(#nodeGradient)" stroke="#0e75b6" stroke-width="2">
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Node cluster 2 -->
    <circle cx="300" cy="40" r="7" fill="url(#nodeGradient)" stroke="#0e75b6" stroke-width="1.5">
      <animate attributeName="r" values="5;9;5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="160" r="7" fill="url(#nodeGradient)" stroke="#0e75b6" stroke-width="1.5">
      <animate attributeName="r" values="6;8;6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="180" r="6" fill="url(#nodeGradient)" stroke="#0e75b6" stroke-width="1.2">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Core processing node -->
    <circle cx="600" cy="100" r="14" fill="url(#nodeGradient)" stroke="#38bdf8" stroke-width="2.5">
      <animate attributeName="r" values="12;16;12" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Node cluster 3 -->
    <circle cx="900" cy="60" r="8" fill="url(#nodeGradient)" stroke="#0e75b6" stroke-width="1.5">
      <animate attributeName="r" values="6;10;6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="140" r="8" fill="url(#nodeGradient)" stroke="#0e75b6" stroke-width="1.5">
      <animate attributeName="r" values="7;11;7" dur="3.1s" repeatCount="indefinite"/>
    </circle>

    <!-- Output node -->
    <circle cx="1100" cy="100" r="12" fill="url(#nodeGradient)" stroke="#38bdf8" stroke-width="2">
      <animate attributeName="r" values="10;14;10" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g>
    <!-- Data packets traversing the network -->
    <circle r="3" fill="#38bdf8" opacity="0.9" filter="url(#glow)">
      <animateMotion dur="4s" repeatCount="indefinite">
        <path d="M100,100 L300,40 L600,100 L900,140 L1100,100"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#38bdf8" opacity="0.8" filter="url(#glow)">
      <animateMotion dur="5.5s" repeatCount="indefinite" begin="1.5s">
        <path d="M100,100 L300,160 L600,100 L900,60 L1100,100"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Subtle Sine Wave Background -->
  <path d="M0,80 Q300,0 600,100 T1200,120" stroke="#0e75b6" stroke-width="1" fill="none" opacity="0.2">
    <animate attributeName="d" 
             values="M0,80 Q300,0 600,100 T1200,120;M0,120 Q300,200 600,100 T1200,80;M0,80 Q300,0 600,100 T1200,120" 
             dur="8s" 
             repeatCount="indefinite"/>
  </path>
</svg>
